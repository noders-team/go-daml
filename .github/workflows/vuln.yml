name: govulncheck

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: vuln-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vuln:
    name: govulncheck
    # Soft gate: job runs only when the 'run-vuln' label is present.
    if: ${{ contains(github.event.pull_request.labels.*.name, 'run-vuln') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify label was added by an admin
        if: ${{ github.event.action == 'labeled' && github.event.label.name == 'run-vuln' }}
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.sender.login,
            });
            if (perm.permission !== 'admin') {
              core.setFailed(
                `Only repository admins can trigger govulncheck. ` +
                `User '${context.payload.sender.login}' has '${perm.permission}'.`
              );
            }

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
          cache: true

      - name: Install govulncheck v1.3.0 (pinned)
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: govulncheck ./...
        run: govulncheck ./...
